<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; background: #0b0710; }
  @keyframes glowFlick {
    0%   { opacity: .50; transform: translate(-50%,-50%) scale(1.00); }
    18%  { opacity: .92; transform: translate(-50%,-50%) scale(1.07); }
    33%  { opacity: .64; transform: translate(-50%,-50%) scale(0.97); }
    50%  { opacity: 1.0; transform: translate(-50%,-50%) scale(1.06); }
    66%  { opacity: .70; transform: translate(-50%,-50%) scale(1.01); }
    82%  { opacity: .95; transform: translate(-50%,-50%) scale(1.04); }
    100% { opacity: .50; transform: translate(-50%,-50%) scale(1.00); }
  }
  @media (prefers-reduced-motion: reduce) { .flick, .eyeglint { animation: none !important; } }
  @keyframes eyeGlint {
    0%,100% { opacity: .35; transform: translate(-50%,-50%) scale(1); }
    30% { opacity: .8; transform: translate(-50%,-50%) scale(1.18); }
    55% { opacity: .45; transform: translate(-50%,-50%) scale(0.95); }
    78% { opacity: .72; transform: translate(-50%,-50%) scale(1.1); }
  }
</style>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#17101f"/><g fill="#ffcf6a"><ellipse cx="50" cy="52" rx="6" ry="12"/><ellipse cx="50" cy="48" rx="3" ry="7" fill="#fff4d0"/></g><circle cx="28" cy="66" r="4" fill="#ff9a3c" opacity=".8"/><circle cx="72" cy="66" r="4" fill="#ff9a3c" opacity=".8"/></svg></template>
</helmet>
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(120% 120% at 50% 30%, #17101f 0%, #0b0710 70%); padding:24px; box-sizing:border-box;">
  <div style="position:relative; width:min(720px, 92vw); container-type:inline-size; line-height:0; border-radius:14px; overflow:hidden; box-shadow:0 30px 90px rgba(0,0,0,.7), 0 0 0 1px rgba(207,162,74,.22);">
    <img src="assets/clara.png" alt="Clara de Oteiza sosteniendo una vela de pareja en su altar" style="display:block; width:100%; height:auto;" />

    <!-- Velas gemelas (pareja): resplandor cálido sobre cada llama real -->
    <div class="flick" style="position:absolute; left:48.7%; top:53.9%; width:2.4cqw; height:4.4cqw; border-radius:50% 50% 50% 50% / 62% 62% 40% 40%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(ellipse 58% 70% at 50% 62%, rgba(255,244,210,.92) 0%, rgba(255,190,90,.5) 42%, rgba(255,120,40,0) 78%); animation:glowFlick 1.5s ease-in-out infinite;"></div>
    <div class="flick" style="position:absolute; left:52.8%; top:55%; width:2.4cqw; height:4.4cqw; border-radius:50% 50% 50% 50% / 62% 62% 40% 40%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(ellipse 58% 70% at 50% 62%, rgba(255,244,210,.92) 0%, rgba(255,190,90,.5) 42%, rgba(255,120,40,0) 78%); animation:glowFlick 1.35s ease-in-out infinite; animation-delay:-0.4s;"></div>

    <!-- Vela alta con soporte, arriba-izquierda -->
    <div class="flick" style="position:absolute; left:5.5%; top:7%; width:4cqw; aspect-ratio:1; border-radius:50%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(circle, rgba(255,214,140,.6) 0%, rgba(255,160,70,.3) 34%, rgba(255,110,40,0) 70%); animation:glowFlick 3.1s ease-in-out infinite; animation-delay:-1.1s;"></div>

    <!-- Farolillo marroquí izquierda -->
    <div class="flick" style="position:absolute; left:10.5%; top:44%; width:8cqw; aspect-ratio:1; border-radius:50%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(circle, rgba(255,200,120,.5) 0%, rgba(255,150,60,.26) 34%, rgba(255,110,40,0) 70%); animation:glowFlick 2.7s ease-in-out infinite; animation-delay:-0.6s;"></div>

    <!-- Vela roja pilar grande, izquierda -->
    <div class="flick" style="position:absolute; left:6%; top:66%; width:8cqw; aspect-ratio:1; border-radius:50%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(circle, rgba(255,206,130,.65) 0%, rgba(255,150,60,.36) 32%, rgba(255,90,30,0) 70%); animation:glowFlick 2.2s ease-in-out infinite; animation-delay:-1.9s;"></div>

    <!-- Vela rosa pilar + farolillo dorado, izquierda -->
    <div class="flick" style="position:absolute; left:13.5%; top:79%; width:6cqw; aspect-ratio:1; border-radius:50%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(circle, rgba(255,190,140,.55) 0%, rgba(255,120,90,.3) 34%, rgba(255,90,60,0) 70%); animation:glowFlick 3.3s ease-in-out infinite; animation-delay:-2.3s;"></div>
    <div class="flick" style="position:absolute; left:14.5%; top:82%; width:4cqw; aspect-ratio:1; border-radius:50%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(circle, rgba(255,214,140,.55) 0%, rgba(255,160,70,.28) 34%, rgba(255,110,40,0) 70%); animation:glowFlick 2.9s ease-in-out infinite; animation-delay:-0.9s;"></div>

    <!-- Vela rosa votiva frontal izquierda -->
    <div class="flick" style="position:absolute; left:20%; top:89.5%; width:6cqw; aspect-ratio:1; border-radius:50%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(circle, rgba(255,190,140,.55) 0%, rgba(255,120,90,.3) 34%, rgba(255,90,60,0) 70%); animation:glowFlick 2.5s ease-in-out infinite; animation-delay:-1.4s;"></div>

    <!-- Vela roja votiva derecha (media altura) -->
    <div class="flick" style="position:absolute; left:89%; top:44%; width:6cqw; aspect-ratio:1; border-radius:50%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(circle, rgba(255,206,130,.55) 0%, rgba(255,150,60,.3) 34%, rgba(255,110,40,0) 70%); animation:glowFlick 2.8s ease-in-out infinite; animation-delay:-0.4s;"></div>

    <!-- Vela roja pilar derecha -->
    <div class="flick" style="position:absolute; left:85%; top:79%; width:8cqw; aspect-ratio:1; border-radius:50%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(circle, rgba(255,206,130,.65) 0%, rgba(255,150,60,.36) 32%, rgba(255,90,30,0) 70%); animation:glowFlick 2.1s ease-in-out infinite; animation-delay:-1.6s;"></div>

    <!-- Vela roja votiva frontal derecha -->
    <div class="flick" style="position:absolute; left:74%; top:90.5%; width:6cqw; aspect-ratio:1; border-radius:50%; mix-blend-mode:screen; pointer-events:none; background:radial-gradient(circle, rgba(255,190,120,.55) 0%, rgba(255,130,70,.3) 34%, rgba(255,90,40,0) 70%); animation:glowFlick 3.0s ease-in-out infinite; animation-delay:-2.1s;"></div>
  </div>
</div>
</x-dc>
</body>
</html>
